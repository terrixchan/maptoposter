<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map Poster H5</title>
    <style>
      :root {
        --bg: #edf2f5;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --primary: #0f766e;
        --primary-hover: #0d5f59;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "SF Pro Text", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 12% 10%, #e0f2f1 0%, transparent 40%),
          radial-gradient(circle at 90% 90%, #e2e8f0 0%, transparent 45%),
          var(--bg);
        min-height: 100vh;
        padding: 20px;
      }

      .wrap {
        width: min(980px, 100%);
        margin: 0 auto;
        display: grid;
        gap: 16px;
      }

      .card {
        background: var(--card);
        border-radius: 16px;
        padding: 18px;
        box-shadow: 0 14px 36px rgba(15, 23, 42, 0.08);
      }

      .title {
        margin: 0;
        font-size: 32px;
        letter-spacing: 0.5px;
      }

      .hint {
        margin: 10px 0 0;
        color: var(--muted);
      }

      .modules {
        display: grid;
        gap: 12px;
      }

      .module {
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 12px;
      }

      .module-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }

      .module-title {
        font-size: 15px;
        font-weight: 700;
      }

      .small {
        font-size: 13px;
        color: var(--muted);
      }

      input, select {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 14px;
        background: #fff;
      }

      .api-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }

      .swatches {
        margin-top: 8px;
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 8px;
      }

      .swatch {
        border-radius: 10px;
        border: 1px solid #d1d5db;
        height: 28px;
      }

      .range-wrap {
        margin-top: 10px;
      }

      .range-labels {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: var(--muted);
        margin-top: 4px;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }

      button {
        border: 0;
        border-radius: 12px;
        padding: 10px 16px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        background: var(--primary);
        color: #fff;
      }

      button:hover { background: var(--primary-hover); }
      button:disabled { opacity: 0.55; cursor: default; }

      .secondary { background: #334155; }

      .status {
        margin-top: 10px;
        color: var(--muted);
        min-height: 20px;
      }

      .result img {
        width: 100%;
        border-radius: 12px;
        border: 1px solid #e5e7eb;
      }

      @media (max-width: 760px) {
        .title { font-size: 26px; }
        .api-row { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1 class="title">地图海报生成（H5）</h1>
        <p class="hint">打开页面后自动获取当前位置，不需要手填城市。你只需要选风格和范围。</p>

        <div class="modules">
          <div class="module">
            <div class="module-head">
              <div class="module-title">模块 1：定位</div>
              <div id="locationText" class="small">定位中...</div>
            </div>
            <div class="api-row">
              <input id="apiBase" value="http://127.0.0.1:8000" placeholder="API Base" />
              <button id="locateBtn" class="secondary">重新定位</button>
            </div>
          </div>

          <div class="module">
            <div class="module-head">
              <div class="module-title">模块 2：样式（所见即所得）</div>
              <div id="themeName" class="small"></div>
            </div>
            <select id="themeSelect"></select>
            <div id="themeDesc" class="small" style="margin-top:6px;"></div>
            <div class="swatches">
              <div id="swatchBg" class="swatch" title="Background"></div>
              <div id="swatchText" class="swatch" title="Text"></div>
              <div id="swatchWater" class="swatch" title="Water"></div>
              <div id="swatchParks" class="swatch" title="Parks"></div>
              <div id="swatchRoadPrimary" class="swatch" title="Road Primary"></div>
              <div id="swatchRoadSecondary" class="swatch" title="Road Secondary"></div>
            </div>
          </div>

          <div class="module">
            <div class="module-head">
              <div class="module-title">模块 3：道路密度缩放</div>
              <div id="distanceText" class="small">10000m</div>
            </div>
            <div class="range-wrap">
              <input id="distanceRange" type="range" min="4000" max="20000" step="1000" value="10000" />
              <div class="range-labels">
                <span>更密（4000）</span>
                <span>更广（20000）</span>
              </div>
            </div>
          </div>
        </div>

        <div class="actions">
          <button id="generateBtn" disabled>生成海报</button>
          <button id="downloadBtn" class="secondary" disabled>下载图片</button>
        </div>
        <div id="status" class="status"></div>
      </div>

      <div class="card result">
        <img id="poster" alt="poster" style="display:none" />
      </div>
    </div>

    <script>
      const el = {
        apiBase: document.getElementById('apiBase'),
        locateBtn: document.getElementById('locateBtn'),
        locationText: document.getElementById('locationText'),
        themeSelect: document.getElementById('themeSelect'),
        themeName: document.getElementById('themeName'),
        themeDesc: document.getElementById('themeDesc'),
        swatchBg: document.getElementById('swatchBg'),
        swatchText: document.getElementById('swatchText'),
        swatchWater: document.getElementById('swatchWater'),
        swatchParks: document.getElementById('swatchParks'),
        swatchRoadPrimary: document.getElementById('swatchRoadPrimary'),
        swatchRoadSecondary: document.getElementById('swatchRoadSecondary'),
        distanceRange: document.getElementById('distanceRange'),
        distanceText: document.getElementById('distanceText'),
        generateBtn: document.getElementById('generateBtn'),
        downloadBtn: document.getElementById('downloadBtn'),
        status: document.getElementById('status'),
        poster: document.getElementById('poster')
      };

      let imageBlobUrl = '';
      let themeDetails = [];
      let currentLocation = null;

      function setStatus(msg) {
        el.status.textContent = msg;
      }

      function resetImage() {
        if (imageBlobUrl) {
          URL.revokeObjectURL(imageBlobUrl);
          imageBlobUrl = '';
        }
        el.poster.style.display = 'none';
        el.poster.src = '';
        el.downloadBtn.disabled = true;
      }

      function updateThemePreview(themeId) {
        const t = themeDetails.find((item) => item.id === themeId);
        if (!t) return;
        el.themeName.textContent = `${t.name} (${t.id})`;
        el.themeDesc.textContent = t.description || 'No description';
        el.swatchBg.style.background = t.bg;
        el.swatchText.style.background = t.text;
        el.swatchWater.style.background = t.water;
        el.swatchParks.style.background = t.parks;
        el.swatchRoadPrimary.style.background = t.road_primary;
        el.swatchRoadSecondary.style.background = t.road_secondary;
      }

      async function loadThemes() {
        const apiBase = el.apiBase.value.trim().replace(/\/$/, '');
        if (!apiBase) return;

        try {
          const res = await fetch(`${apiBase}/api/themes/details`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          themeDetails = Array.isArray(data.themes) ? data.themes : [];
          if (!themeDetails.length) throw new Error('No themes');

          el.themeSelect.innerHTML = '';
          for (const t of themeDetails) {
            const option = document.createElement('option');
            option.value = t.id;
            option.textContent = `${t.name} (${t.id})`;
            el.themeSelect.appendChild(option);
          }
          const defaultTheme = themeDetails.find((t) => t.id === 'terracotta') || themeDetails[0];
          el.themeSelect.value = defaultTheme.id;
          updateThemePreview(defaultTheme.id);
        } catch (err) {
          el.themeSelect.innerHTML = '<option value="terracotta">terracotta</option>';
          setStatus(`主题加载失败：${err.message || err}`);
        }
      }

      async function reverseCity(lat, lon) {
        const apiBase = el.apiBase.value.trim().replace(/\/$/, '');
        const url = `${apiBase}/api/location/reverse?latitude=${encodeURIComponent(lat)}&longitude=${encodeURIComponent(lon)}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      }

      async function locateUser() {
        if (!navigator.geolocation) {
          setStatus('当前浏览器不支持定位。');
          return;
        }
        el.generateBtn.disabled = true;
        el.locationText.textContent = '定位中...';
        setStatus('正在获取定位...');

        navigator.geolocation.getCurrentPosition(
          async (position) => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            try {
              const place = await reverseCity(lat, lon);
              currentLocation = {
                city: place.city || 'Current Location',
                country: place.country || 'Unknown',
                latitude: lat,
                longitude: lon
              };
              el.locationText.textContent = `${currentLocation.city}, ${currentLocation.country}`;
              el.generateBtn.disabled = false;
              setStatus('定位成功，可以生成海报。');
            } catch (err) {
              currentLocation = {
                city: 'Current Location',
                country: 'Unknown',
                latitude: lat,
                longitude: lon
              };
              el.locationText.textContent = `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
              el.generateBtn.disabled = false;
              setStatus('定位成功（城市解析失败，已使用坐标）。');
            }
          },
          (error) => {
            const msg = error && error.message ? error.message : '定位失败';
            el.locationText.textContent = '未定位';
            setStatus(`定位失败：${msg}。请允许浏览器定位权限。`);
          },
          {
            enableHighAccuracy: true,
            timeout: 12000,
            maximumAge: 30000
          }
        );
      }

      async function generate() {
        const apiBase = el.apiBase.value.trim().replace(/\/$/, '');
        const theme = el.themeSelect.value || 'terracotta';
        const distance = el.distanceRange.value || '10000';

        if (!apiBase) {
          setStatus('请填写 API 地址。');
          return;
        }
        if (!currentLocation) {
          setStatus('尚未完成定位。');
          return;
        }

        resetImage();
        el.generateBtn.disabled = true;
        setStatus('生成中，请稍候...');

        const url = `${apiBase}/api/posters/generate?city=${encodeURIComponent(currentLocation.city)}&country=${encodeURIComponent(currentLocation.country)}&theme=${encodeURIComponent(theme)}&distance=${encodeURIComponent(distance)}&fmt=png&latitude=${encodeURIComponent(currentLocation.latitude)}&longitude=${encodeURIComponent(currentLocation.longitude)}`;

        try {
          const res = await fetch(url);
          if (!res.ok) {
            const text = await res.text();
            throw new Error(`HTTP ${res.status}: ${text}`);
          }

          const blob = await res.blob();
          imageBlobUrl = URL.createObjectURL(blob);
          el.poster.src = imageBlobUrl;
          el.poster.style.display = 'block';
          el.downloadBtn.disabled = false;
          setStatus(`生成成功：${currentLocation.city}`);
        } catch (err) {
          setStatus(`生成失败：${err.message || err}`);
        } finally {
          el.generateBtn.disabled = false;
        }
      }

      el.themeSelect.addEventListener('change', () => {
        updateThemePreview(el.themeSelect.value);
      });

      el.distanceRange.addEventListener('input', () => {
        el.distanceText.textContent = `${el.distanceRange.value}m`;
      });

      el.locateBtn.addEventListener('click', locateUser);
      el.generateBtn.addEventListener('click', generate);
      el.downloadBtn.addEventListener('click', () => {
        if (!imageBlobUrl) return;
        const a = document.createElement('a');
        a.href = imageBlobUrl;
        a.download = 'map-poster.png';
        a.click();
      });
      el.apiBase.addEventListener('blur', async () => {
        await loadThemes();
        await locateUser();
      });

      loadThemes().then(locateUser);
    </script>
  </body>
</html>
